<!DOCTYPE html><html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="manifest" href="manifest.json"><meta name="theme-color" content="#111827">
<style>
body{margin:0;background:#111827;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden}
header{display:flex;gap:8px;align-items:center;padding:12px;background:#111827;border-bottom:1px solid #444}
button,input::file-selector-button{background:#2563eb;color:#fff;border:0;border-radius:10px;padding:9px 12px}
#pageInfo{margin-left:auto}
#viewer{height:calc(100vh - 58px);overflow:auto;display:flex;justify-content:center;padding:12px;background:#374151}
canvas{background:#fff;box-shadow:0 8px 20px rgba(0,0,0,.4)}
</style></head><body>
<header><input id=file type=file accept=application/pdf><button id=prev disabled>Prev</button><button id=next disabled>Next</button><span id=pageInfo>No PDF</span></header>
<div id=viewer><canvas id=pdf hidden></canvas><div id=msg>Choose a PDF</div></div>
<script type=module>
import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.worker.mjs';
if('serviceWorker' in navigator) navigator.serviceWorker.register('./service-worker.js');
let doc=null,pageNum=1,rendering=false;
const c=pdf,ctx=c.getContext('2d'),wrap=viewer;
async function renderPage(n){
 if(!doc||rendering)return; rendering=true;
 const page=await doc.getPage(n);
 const base=page.getViewport({scale:1});
 const scale=(Math.max(280,wrap.clientWidth-24))/base.width;
 const dpr=window.devicePixelRatio||1;
 const vp=page.getViewport({scale:scale*dpr});
 c.width=vp.width;c.height=vp.height;
 c.style.width=(vp.width/dpr)+'px';
 c.style.height=(vp.height/dpr)+'px';
 await page.render({canvasContext:ctx,viewport:vp}).promise;
 pageInfo.textContent=`Page ${pageNum} / ${doc.numPages}`;
 prev.disabled=pageNum<=1;next.disabled=pageNum>=doc.numPages;
 rendering=false;
}
file.onchange=async()=>{
 const f=file.files[0]; if(!f)return;
 doc=await pdfjsLib.getDocument({data:await f.arrayBuffer()}).promise;
 msg.hidden=true;c.hidden=false;pageNum=1;renderPage(pageNum);
};
prev.onclick=()=>{if(pageNum>1){pageNum--;renderPage(pageNum);}};
next.onclick=()=>{if(pageNum<doc.numPages){pageNum++;renderPage(pageNum);}};
addEventListener('resize',()=>doc&&renderPage(pageNum));
</script></body></html>
