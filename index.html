<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<title>Notes</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;background:#f5f5f7}
header{background:#2563eb;color:#fff;padding:16px;font-size:24px;font-weight:700}
#wrap{padding:16px}
textarea{width:100%;height:90px;padding:10px;box-sizing:border-box}
button{margin-top:10px;padding:10px 16px}
.note{background:#fff;padding:12px;margin-top:12px;border-radius:10px}
.small{float:right}
</style></head>
<body>
<header>Notes</header>
<div id="wrap">
<textarea id="txt" placeholder="Write a note..."></textarea><br>
<button onclick="add()">Add Note</button>
<div id="list"></div>
</div>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('service-worker.js');}
let notes=JSON.parse(localStorage.getItem('notes')||'[]');
function save(){localStorage.setItem('notes',JSON.stringify(notes));render();}
function add(){let t=txt.value.trim();if(!t)return;notes.unshift({t});txt.value='';save();}
function del(i){notes.splice(i,1);save();}
function render(){list.innerHTML='';notes.forEach((n,i)=>{let d=document.createElement('div');d.className='note';d.innerHTML='<button class="small" onclick="del('+i+')">Delete</button>'+n.t.replace(/\n/g,'<br>');list.appendChild(d);});}
render();
</script>
</body></html>
