<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">
<title>PDF Annotate Test</title>
<style>
body{margin:0;background:#111827;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden}
header{display:flex;gap:6px;align-items:center;padding:12px;background:#111827;border-bottom:1px solid #444;overflow-x:auto}
button,input::file-selector-button{background:#2563eb;color:#fff;border:0;border-radius:10px;padding:9px 12px;white-space:nowrap}
button.active{background:#f59e0b;color:#111}
button.danger{background:#dc2626}
#pageInfo{margin-left:auto;white-space:nowrap}
#viewer{height:calc(100vh - 58px);overflow:auto;display:flex;justify-content:center;padding:12px;background:#374151;box-sizing:border-box}
#stage{position:relative}
canvas{display:block;background:#fff;box-shadow:0 8px 20px rgba(0,0,0,.4)}
#draw{position:absolute;left:0;top:0;background:transparent;touch-action:none}
#msg{margin-top:70px;color:#ddd}
</style>
</head>
<body>
<header>
<input id="file" type="file" accept="application/pdf">
<button id="prev" disabled>Prev</button>
<button id="next" disabled>Next</button>
<button id="rectTool" disabled>Rect</button>
<button id="circleTool" disabled>Circle</button>
<button id="clearPage" class="danger" disabled>Clear</button>
<span id="pageInfo">No PDF</span>
</header>

<div id="viewer">
  <div id="stage" hidden>
    <canvas id="pdf"></canvas>
    <canvas id="draw"></canvas>
  </div>
  <div id="msg">Choose a PDF</div>
</div>

<script type="module">
import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.worker.mjs';

if('serviceWorker' in navigator) navigator.serviceWorker.register('./service-worker.js');

let doc=null,pageNum=1,rendering=false,pdfKey='',tool='rect';
let shapesByPage={},start=null,current=null;

const pdfCanvas=pdf, pdfCtx=pdfCanvas.getContext('2d');
const drawCanvas=draw, drawCtx=drawCanvas.getContext('2d');

function saveShapes(){
  if(!pdfKey)return;
  localStorage.setItem('annotations_'+pdfKey, JSON.stringify(shapesByPage));
}
function loadShapes(){
  shapesByPage = JSON.parse(localStorage.getItem('annotations_'+pdfKey) || '{}');
}
function currentShapes(){
  const key=String(pageNum);
  if(!shapesByPage[key]) shapesByPage[key]=[];
  return shapesByPage[key];
}
function setTool(t){
  tool=t;
  rectTool.classList.toggle('active',t==='rect');
  circleTool.classList.toggle('active',t==='circle');
}
function drawAll(preview=false){
  drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
  const scale = drawCanvas.width / drawCanvas.clientWidth;
  drawCtx.save();
  drawCtx.scale(scale,scale);
  drawCtx.lineWidth=3;
  drawCtx.strokeStyle='#ef4444';
  drawCtx.fillStyle='rgba(239,68,68,.12)';
  for(const s of currentShapes()){
    drawShape(s);
  }
  if(preview && start && current){
    drawShape(makeShape(start,current,tool));
  }
  drawCtx.restore();
}
function drawShape(s){
  if(s.type==='rect'){
    drawCtx.beginPath();
    drawCtx.rect(s.x,s.y,s.w,s.h);
    drawCtx.fill();
    drawCtx.stroke();
  } else if(s.type==='circle'){
    const cx=s.x+s.w/2, cy=s.y+s.h/2;
    const r=Math.max(Math.abs(s.w),Math.abs(s.h))/2;
    drawCtx.beginPath();
    drawCtx.ellipse(cx,cy,Math.abs(s.w)/2,Math.abs(s.h)/2,0,0,Math.PI*2);
    drawCtx.fill();
    drawCtx.stroke();
  }
}
function pos(e){
  const r=drawCanvas.getBoundingClientRect();
  const touch=e.touches ? e.touches[0] : e;
  return {x:touch.clientX-r.left,y:touch.clientY-r.top};
}
function makeShape(a,b,type){
  return {
    type,
    x:Math.min(a.x,b.x),
    y:Math.min(a.y,b.y),
    w:Math.abs(b.x-a.x),
    h:Math.abs(b.y-a.y)
  };
}

async function renderPage(n){
  if(!doc||rendering)return;
  rendering=true;
  const page=await doc.getPage(n);
  const base=page.getViewport({scale:1});
  const displayScale=(Math.max(280,viewer.clientWidth-24))/base.width;
  const dpr=window.devicePixelRatio||1;
  const vp=page.getViewport({scale:displayScale*dpr});

  pdfCanvas.width=vp.width;
  pdfCanvas.height=vp.height;
  pdfCanvas.style.width=(vp.width/dpr)+'px';
  pdfCanvas.style.height=(vp.height/dpr)+'px';

  drawCanvas.width=vp.width;
  drawCanvas.height=vp.height;
  drawCanvas.style.width=(vp.width/dpr)+'px';
  drawCanvas.style.height=(vp.height/dpr)+'px';
  stage.style.width=(vp.width/dpr)+'px';
  stage.style.height=(vp.height/dpr)+'px';

  await page.render({canvasContext:pdfCtx,viewport:vp}).promise;

  pageInfo.textContent=`Page ${pageNum} / ${doc.numPages}`;
  prev.disabled=pageNum<=1;
  next.disabled=pageNum>=doc.numPages;
  drawAll(false);
  rendering=false;
}

file.onchange=async()=>{
  const f=file.files[0]; if(!f)return;
  pdfKey=f.name; // easy version: annotations are tied to the file name
  loadShapes();
  doc=await pdfjsLib.getDocument({data:await f.arrayBuffer()}).promise;
  pageNum=1;
  msg.hidden=true;
  stage.hidden=false;
  prev.disabled=false; next.disabled=false; rectTool.disabled=false; circleTool.disabled=false; clearPage.disabled=false;
  setTool('rect');
  renderPage(pageNum);
};

prev.onclick=()=>{if(pageNum>1){pageNum--;renderPage(pageNum);}};
next.onclick=()=>{if(doc&&pageNum<doc.numPages){pageNum++;renderPage(pageNum);}};
rectTool.onclick=()=>setTool('rect');
circleTool.onclick=()=>setTool('circle');

clearPage.onclick=()=>{
  if(!doc)return;
  shapesByPage[String(pageNum)]=[];
  saveShapes();
  drawAll(false);
};

drawCanvas.addEventListener('pointerdown',e=>{
  if(!doc)return;
  drawCanvas.setPointerCapture(e.pointerId);
  start=pos(e);
  current=start;
});
drawCanvas.addEventListener('pointermove',e=>{
  if(!start)return;
  current=pos(e);
  drawAll(true);
});
drawCanvas.addEventListener('pointerup',e=>{
  if(!start)return;
  current=pos(e);
  const s=makeShape(start,current,tool);
  start=null; current=null;
  if(s.w>8 && s.h>8){
    currentShapes().push(s);
    saveShapes();
  }
  drawAll(false);
});
addEventListener('resize',()=>doc&&renderPage(pageNum));
</script>
</body>
</html>
